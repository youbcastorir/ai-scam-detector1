<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScamShield AI — Advanced AI Scam Detector</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        cyber: {
                            bg: '#030712',
                            card: '#0b0f19',
                            border: '#1f293d',
                            accent: '#22c55e',
                            alert: '#ef4444',
                            warn: '#f59e0b',
                        }
                    }
                }
            }
        }
    </script>
    <!-- React & ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX compilation in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Tesseract.js for Local Client-Side OCR -->
    <script src="https://unpkg.com/tesseract.js@5.1.1/dist/tesseract.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'Fira Code', monospace; }
    </style>
</head>
<body class="bg-[#030712] text-slate-100 antialiased selection:bg-green-500 selection:text-black min-h-screen relative overflow-x-hidden">

    <div id="root"></div>

    <!-- React Application Implementation Logic -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // Hardcoded Free Tier API Token for instant out-of-the-box public utilization
        // Replace "PASTE_YOUR_GROQ_API_KEY_HERE" with your actual Groq key (e.g., gsk_...)
        const PUBLIC_GROQ_API_KEY = "PASTE_YOUR_GROQ_API_KEY_HERE";

        const dict = {
            title: "AI Scam Detector",
            subtitle: "Instantly analyze texts, URLs, SMS, and screenshots for cyber fraud using advanced military-grade security models.",
            placeholder: "Paste the message, email text, job offer description, or suspicious web URL here...",
            analyzeBtn: "Analyze Threat Vector",
            analyzing: "Deconstructing payload & verifying...",
            ocrBtn: "Extract Text From Image",
            ocrProcessing: "Running OCR scan...",
            history: "Local Audit Log",
            risk: "Risk Assessment Vector",
            confidence: "Model Confidence Matrix",
            flags: "Identified Attack Signatures",
            tactics: "Psychological Manipulation Indicators",
            actions: "Countermeasure Directives",
            probability: "Scam Probability Indicator",
            types: { text: "Raw Message / Document", url: "URL Web Link" }
        };

        const SYSTEM_PROMPT = `You are an advanced cybersecurity fraud detection AI specialized in phishing, online scams, social engineering, fake banking messages, fake jobs, romance scams, investment fraud, and identity theft.
        Your mission is to analyze suspicious digital content and determine if it is potentially fraudulent.
        
        You MUST return a raw JSON response matching this exact schema layout. Do not wrap it in markdown block code formatting:
        {
          "scam_probability": 85,
          "risk_level": "Dangerous", 
          "summary": "Detailed context explaining exactly why this text or link represents a critical security threat vector.",
          "red_flags": ["Urgent non-standard phrasing", "Suspicious tracking link structure", "Impersonation of local institutional branding"],
          "manipulation_tactics": ["Scarcity/Artificial Urgency", "Authority Pressure Mapping"],
          "recommended_actions": ["Do not click the provided link", "Block the sender profile immediately", "Report variant signature to authorities"],
          "confidence": 92
        }
        Risk levels can only be: Safe, Suspicious, Dangerous. Prioritize user safety. Actively scan for regional variants, including international, European, and Moroccan local scam patterns (like fake WhatsApp task hiring, malicious package delivery alerts, or CIH/Attijari bank lookalikes).`;

        function App() {
            const [inputType, setInputType] = useState('text');
            const [content, setContent] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [ocrLoading, setOcrLoading] = useState(false);
            const [analysisResult, setAnalysisResult] = useState(null);
            const [history, setHistory] = useState([]);
            const [copied, setCopied] = useState(false);

            useEffect(() => {
                const storedHistory = localStorage.getItem('scam_shield_history');
                if (storedHistory) setHistory(JSON.parse(storedHistory));
            }, []);

            const handleOcrUpload = async (e) => {
                const file = e.target.files?.[0];
                if (!file) return;
                setOcrLoading(true);
                setInputType('text');
                try {
                    const worker = await Tesseract.createWorker('eng+ara');
                    const ret = await worker.recognize(file);
                    setContent(ret.data.text);
                    await worker.terminate();
                } catch (err) {
                    console.error("OCR Exception processing artifact: ", err);
                } finally {
                    setOcrLoading(false);
                }
            };

            const handleScanExecution = async () => {
                if (!content.trim()) return;
                setIsLoading(true);
                setAnalysisResult(null);

                try {
                    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${PUBLIC_GROQ_API_KEY}`,
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            model: 'llama-3.3-70b-versatile',
                            messages: [
                                { role: 'system', content: SYSTEM_PROMPT },
                                { role: 'user', content: `Content Type Category: ${inputType}\n\nContent Payload To Scan:\n"""\n${content}\n"""` }
                            ],
                            temperature: 0.1,
                            response_format: { type: "json_object" }
                        }),
                    });

                    if (!res.ok) {
                        throw new Error("API Connection Interrupt");
                    }

                    const data = await res.json();
                    const parsedData = JSON.parse(data.choices[0].message.content);
                    
                    setAnalysisResult(parsedData);

                    const newLog = {
                        timestamp: new Date().toLocaleTimeString(),
                        preview: content.substring(0, 50) + '...',
                        risk: parsedData.risk_level,
                        score: parsedData.scam_probability
                    };
                    const updatedLogs = [newLog, ...history.slice(0, 4)];
                    setHistory(updatedLogs);
                    localStorage.setItem('scam_shield_history', JSON.stringify(updatedLogs));

                } catch (err) {
                    alert('Analysis sequence interrupted. Please check your public API token status configuration or internet route latency.');
                    console.error(err);
                } finally {
                    setIsLoading(false);
                }
            };

            const handleCopyReport = () => {
                navigator.clipboard.writeText(JSON.stringify(analysisResult, null, 2));
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            const riskColor = analysisResult?.risk_level === 'Dangerous' ? 'text-red-400' : analysisResult?.risk_level === 'Suspicious' ? 'text-amber-400' : 'text-green-400';
            const riskBg = analysisResult?.risk_level === 'Dangerous' ? 'bg-red-950/20 border-red-500/30 shadow-glow-red' : analysisResult?.risk_level === 'Suspicious' ? 'bg-amber-950/20 border-amber-500/30' : 'bg-green-950/20 border-green-500/30';

            return (
                <div className="p-4 md:p-8 max-w-4xl mx-auto space-y-8 relative z-10">
                    
                    {/* Header Banner */}
                    <header className="flex justify-between items-center border-b border-slate-800 pb-4">
                        <div className="flex items-center gap-2">
                            <span className="font-mono font-bold text-xl tracking-wider">SCAM<span className="text-green-500">SHIELD</span></span>
                        </div>
                        <div className="flex items-center gap-2 px-2.5 py-1 rounded bg-green-500/10 border border-green-500/20 text-green-400 font-mono text-[11px]">
                            <span className="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse" /> Public Free Gateway Active
                        </div>
                    </header>

                    {/* Hero Branding */}
                    <div className="text-center space-y-3 pt-4">
                        <h1 className="text-4xl md:text-5xl font-black tracking-tight">{dict.title}</h1>
                        <p className="text-slate-400 max-w-2xl mx-auto text-sm md:text-base font-light">{dict.subtitle}</p>
                    </div>

                    {/* Threat Input Terminal Area */}
                    <div className="bg-slate-950 border border-slate-800 rounded-2xl p-4 md:p-6 shadow-2xl space-y-4">
                        <div className="flex flex-wrap gap-2 border-b border-slate-900 pb-3 text-xs md:text-sm">
                            <button onClick={() => { setInputType('text'); setContent(''); }} className={`px-4 py-2 rounded font-mono transition-all ${inputType === 'text' ? 'bg-slate-900 text-green-400 border border-slate-800' : 'text-slate-400 hover:text-white'}`}>
                                {dict.types.text}
                            </button>
                            <button onClick={() => { setInputType('url'); setContent(''); }} className={`px-4 py-2 rounded font-mono transition-all ${inputType === 'url' ? 'bg-slate-900 text-green-400 border border-slate-800' : 'text-slate-400 hover:text-white'}`}>
                                {dict.types.url}
                            </button>
                            <label className="ms-auto border border-dashed border-slate-800 px-3 py-2 rounded text-xs text-slate-400 hover:text-green-400 cursor-pointer font-mono transition-all">
                                <span>{ocrLoading ? dict.ocrProcessing : dict.ocrBtn}</span>
                                <input type="file" accept="image/*" className="hidden" onChange={handleOcrUpload} disabled={ocrLoading} />
                            </label>
                        </div>

                        <textarea
                            value={content}
                            onChange={(e) => setContent(e.target.value)}
                            placeholder={dict.placeholder}
                            rows="5"
                            className="w-full bg-slate-900/40 border border-slate-800 rounded-xl p-4 text-slate-100 placeholder:text-slate-700 focus:outline-none focus:border-green-500/30 text-sm md:text-base font-sans resize-none transition-all"
                        />

                        <div className="flex justify-between items-center pt-2">
                            <span className="text-[11px] text-slate-600 font-mono">🛡️ Core Sandbox Session Encrypted</span>
                            <button 
                                onClick={handleScanExecution}
                                disabled={isLoading || !content.trim()}
                                className="bg-green-600 hover:bg-green-500 text-black font-mono font-bold text-xs md:text-sm px-6 py-2.5 rounded-xl transition-all disabled:opacity-30 disabled:cursor-not-allowed shadow-md"
                            >
                                {isLoading ? dict.analyzing : dict.analyzeBtn}
                            </button>
                        </div>
                    </div>

                    {/* Intelligence Output Diagnostics Card */}
                    {analysisResult && (
                        <div className={`border ${riskBg} rounded-2xl p-6 space-y-6 transition-all duration-500`}>
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b border-slate-800/60 pb-4">
                                <div>
                                    <div className="text-[10px] text-slate-500 font-mono uppercase tracking-widest">{dict.risk}</div>
                                    <div className={`text-2xl md:text-3xl font-black font-mono uppercase mt-0.5 ${riskColor}`}>{analysisResult.risk_level}</div>
                                </div>
                                <div className="w-full md:w-56">
                                    <div className="flex justify-between text-xs font-mono text-slate-400 mb-1">
                                        <span>{dict.probability}</span>
                                        <span className={`font-bold ${riskColor}`}>{analysisResult.scam_probability}%</span>
                                    </div>
                                    <div className="h-2 w-full bg-slate-900 rounded-full overflow-hidden border border-slate-800">
                                        <div className={`h-full ${analysisResult.risk_level === 'Dangerous' ? 'bg-red-500' : analysisResult.risk_level === 'Suspicious' ? 'bg-amber-500' : 'bg-green-500'} transition-all duration-1000`} style={{ width: `${analysisResult.scam_probability}%` }} />
                                    </div>
                                    <div className="text-[10px] text-slate-600 font-mono mt-1 text-right">{dict.confidence}: {analysisResult.confidence}%</div>
                                </div>
                            </div>

                            <p className="text-slate-300 text-sm md:text-base leading-relaxed font-light">{analysisResult.summary}</p>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs md:text-sm">
                                <div className="bg-slate-950 p-4 rounded-xl border border-slate-900/60">
                                    <div className="text-slate-500 font-mono mb-2.5 uppercase font-bold text-[10px] tracking-wider">{dict.flags}</div>
                                    <ul className="list-disc list-inside space-y-1.5 text-slate-400 font-light">
                                        {analysisResult.red_flags?.map((f, i) => <li key={i}>{f}</li>)}
                                    </ul>
                                </div>
                                <div className="bg-slate-950 p-4 rounded-xl border border-slate-900/60">
                                    <div className="text-slate-500 font-mono mb-2.5 uppercase font-bold text-[10px] tracking-wider">{dict.tactics}</div>
                                    <ul className="list-disc list-inside space-y-1.5 text-slate-400 font-light">
                                        {analysisResult.manipulation_tactics?.map((m, i) => <li key={i}>{m}</li>)}
                                    </ul>
                                </div>
                            </div>

                            {analysisResult.recommended_actions?.length > 0 && (
                                <div className="bg-slate-950/80 p-4 rounded-xl border border-slate-800/60 text-xs md:text-sm">
                                    <div className="text-slate-400 font-mono mb-3 uppercase font-bold text-[10px] tracking-wider">{dict.actions}</div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                                        {analysisResult.recommended_actions.map((act, i) => (
                                            <div key={i} className="text-slate-300 flex items-start gap-2 bg-slate-900/20 p-2 rounded border border-slate-900/40">
                                                <span className="text-green-500 font-mono font-bold">[0{i+1}]</span> 
                                                <span>{act}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            <div className="flex justify-end pt-2">
                                <button 
                                    onClick={handleCopyReport}
                                    className="flex items-center gap-1.5 text-xs font-mono text-slate-500 hover:text-green-400 transition-all border border-slate-900 bg-slate-950 px-3 py-1.5 rounded-lg"
                                >
                                    {copied ? "Copied" : "Copy Full JSON Output Audit"}
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Local Tracking Logs Timeline */}
                    {history.length > 0 && (
                        <div className="bg-slate-950/40 border border-slate-900 rounded-xl p-4 font-mono text-[11px]">
                            <div className="text-slate-600 font-bold mb-2.5 uppercase tracking-wider">{dict.history}</div>
                            <div className="space-y-1.5">
                                {history.map((h, idx) => (
                                    <div key={idx} className="flex justify-between items-center bg-slate-950 p-2 rounded border border-slate-900/60">
                                        <span className="text-slate-600">{h.timestamp}</span>
                                        <span className="text-slate-400 truncate max-w-xs md:max-w-md mx-2">{h.preview}</span>
                                        <span className={`px-2 py-0.5 rounded text-[10px] font-bold ${h.risk === 'Dangerous' ? 'bg-red-500/10 text-red-400' : h.risk === 'Suspicious' ? 'bg-amber-500/10 text-amber-400' : 'bg-green-500/10 text-green-400'}`}>{h.risk}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Footer Attribution */}
                    <footer className="pt-8 text-center text-[10px] font-mono text-slate-700 border-t border-slate-900">
                        SCAMSHIELD CORE LABS // OPEN PUBLIC GATEWAY RUNTIME DEPLOYED
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
